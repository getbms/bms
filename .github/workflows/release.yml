name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "bms-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bms-windows
          path: bms-windows.zip

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build macOS
        run: flutter build macos --release

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks ../../../../../bms-macos.zip bms.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bms-macos
          path: bms-macos.zip

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web
        run: flutter build web --release --no-wasm

      - name: Package
        run: zip -r bms-web.zip build/web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bms-web
          path: bms-web.zip

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bms-windows/bms-windows.zip
            bms-macos/bms-macos.zip
            bms-web/bms-web.zip
          generate_release_notes: true
