name: Build

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze --fatal-infos --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter test test/unit/ --reporter=github

  build-windows:
    name: Windows
    needs: [lint, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath bms-windows.zip

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: bms-windows
          path: bms-windows.zip
          retention-days: 14

  build-macos:
    name: macOS
    needs: [lint, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - run: flutter build macos --release

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - build/macos/Build/Products/Release/bms.app

      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks ../../../../../bms-macos.zip bms.app

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: bms-macos
          path: bms-macos.zip
          retention-days: 14
